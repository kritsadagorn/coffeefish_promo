<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/public/logocff.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <title>Rent rod - Bosang Fishing Park</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background-color: #5ce1e6;
        font-family: "Roboto", system-ui, -apple-system, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .page {
        width: 100%;
        max-width: 1200px;
        padding: 14px 24px 64px;
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .top-banner {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 40px;
        background-color: #eb2030;
        color: #faf1b3;
        border-radius: 16px;
        margin-bottom: 14px;
        font-size: 44px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .layout-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        width: 100%;
      }

      .side-label {
        background-color: #ffe8ae;
        border-radius: 16px;
        padding: 24px 18px;
        font-size: 38px;
        font-weight: 800;
        color: #e6391a;
        text-align: center;
        min-width: 230px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.1;
      }

      .center-img {
        flex: 1;
        min-width: 0;
      }

      .center-img img {
        display: block;
        width: 100%;
        max-width: 760px;
        height: auto;
        max-height: 64vh;
        object-fit: contain;
        margin: 0 auto;
      }

      .terms-panel {
        background-color: #ffb247;
        border-radius: 50px;
        padding: 28px 26px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        min-width: 230px;
      }

      .terms-title {
        font-size: 32px;
        font-weight: 800;
        text-align: center;
      }

      .click-btn {
        display: inline-block;
        margin-top: 4px;
        padding: 10px 26px;
        border-radius: 999px;
        background-color: #ff3232;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
        font-size: 24px;
      }

      .home-btn {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 72px;
        height: 72px;
      }

      .home-btn img {
        width: 100%;
        height: 100%;
        display: block;
      }

      @media (max-width: 1200px) and (min-width: 961px) {
        .page {
          padding: 10px 16px 56px;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .top-banner {
          margin-bottom: 10px;
          font-size: 32px;
          padding: 8px 28px;
        }

        .layout-row {
          justify-content: space-around;
          gap: 8px;
        }

        .side-label {
          flex: 0 0 auto;
          padding: 10px 8px;
          font-size: 42px;
          min-width: 120px;
          margin-left: 24px;
        }

        .center-img {
          flex: 0 1 auto;
          margin-left: 24px;
        }

        .center-img img {
          max-width: 600px;
          width: auto;
          max-height: 60vh;
          object-fit: contain;
        }

        .terms-panel {
          flex: 0 0 auto;
          min-width: 190px;
          padding: 16px 14px 14px;
          gap: 12px;
          border-radius: 44px;
        }

        .terms-title {
          font-size: 26px;
        }

        .click-btn {
          padding: 8px 18px;
          font-size: 20px;
        }

        .home-btn {
          width: 64px;
          height: 64px;
        }
      }

      .side-label .mobile-normal {
        display: none;
      }
      .side-label .desktop-vertical {
        display: block;
      }
      .side-label .desktop-vertical .word {
        display: block;
      }
      .side-label .desktop-vertical .word + .word {
        margin-top: 14px;
      }
      .side-label .mobile-normal .gap {
        display: inline-block;
        width: 0.6em;
      }

      @media (max-width: 960px) {
        .page {
          padding: 12px 10px 72px;
        }

        .top-banner {
          font-size: 26px;
          padding: 8px 20px;
        }

        .layout-row {
          flex-direction: column;
        }

        .center-img img {
          max-width: 100%;
        }

        .side-label {
          writing-mode: horizontal-tb;
          text-orientation: mixed;
          padding: 10px 10px;
          font-size: 20px;
          width: 100%;
        }
        .side-label .desktop-vertical {
          display: none;
        }
        .side-label .mobile-normal {
          display: block;
        }

        .terms-panel {
          padding: 14px 12px 12px;
          width: 100%;
        }

        .terms-title br {
          display: none;
        }
        .terms-title {
          font-size: 18px;
          white-space: nowrap;
        }
        .click-btn {
          display: block;
          text-align: center;
          font-size: 16px;
          padding: 8px 20px;
        }

        .home-btn {
          width: 64px;
          height: 64px;
          right: 16px;
          bottom: 16px;
        }
      }
      /* page-fade */
      body { opacity: 0; transition: opacity 220ms ease; }
      body.is-ready { opacity: 1; }
      body.is-fading { opacity: 0; }
      @media (prefers-reduced-motion: reduce) {
        body { transition: none; }
      }

    </style>
  </head>
  <body>
    <div class="page">
      <div class="top-banner">Deposit 2000 ฿/rod</div>

      <div class="layout-row">
        <div class="side-label">
          <span class="desktop-vertical">
            <span class="word">R<br />O<br />D</span>
            <span class="word">R<br />E<br />N<br />T<br />A<br />L</span>
          </span>
          <span class="mobile-normal"><span>ROD</span><span class="gap"></span><span>RENTAL</span></span>
        </div>

        <div class="center-img">
          <img decoding="async" src="public/13rent.webp" alt="Rod rental fishing fee" />
        </div>

        <div class="terms-panel">
          <div class="terms-title">TERMS AND<br /> CONDITIONS<br />OF SERVICE</div>
          <a href="en-rent-rules.html" class="click-btn">CLICK HERE</a>
        </div>
      </div>

      <a href="index.html" class="home-btn" aria-label="Go to home">
        <img decoding="async" src="public/3home.webp" alt="Home button" />
      </a>
    </div>

    <script>
      (function () {
        function markReady() {
          document.body.classList.add("is-ready");
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", markReady);
        } else {
          markReady();
        }

        var prefersReduced = false;
        try {
          prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        } catch (e) {}
        if (prefersReduced) return;

        document.addEventListener(
          "click",
          function (e) {
            var a = e.target && e.target.closest ? e.target.closest("a") : null;
            if (!a) return;

            if (e.defaultPrevented) return;
            if (e.button !== 0) return;
            if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
            if (a.target && a.target !== "_self") return;

            var href = a.getAttribute("href");
            if (!href || href === "#") return;
            if (href.indexOf("javascript:") === 0) return;
            if (href[0] === "#") return;

            e.preventDefault();
            document.body.classList.add("is-fading");
            window.setTimeout(function () {
              window.location.href = href;
            }, 200);
          },
          true
        );

        if ("serviceWorker" in navigator) {
          window.addEventListener("load", function () {
            navigator.serviceWorker.register("sw.js").catch(function () {});
          });
        }

      })();
    </script>

  </body>
</html>
