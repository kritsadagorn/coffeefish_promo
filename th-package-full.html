<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แพ็กเกจเต็มวัน - Bosang Fishing Park</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        background-color: #5ce1e6;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 24px 96px;
      }
      .page {
        width: 100%;
        max-width: 1200px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .main-img {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 18px;
      }
      .home-btn {
        position: fixed;
        right: 24px;
        bottom: 24px;
        width: 72px;
        height: 72px;
        display: inline-block;
      }
      .home-btn img { width: 100%; height: 100%; display: block; }
      @media (max-width: 900px) {
        .home-btn { width: 56px; height: 56px; right: 16px; bottom: 16px; }
      }
      @media (max-width: 600px) {
        body { padding: 16px 16px 96px; }
      }
      /* page-fade */
      body { opacity: 0; transition: opacity 220ms ease; }
      body.is-ready { opacity: 1; }
      body.is-fading { opacity: 0; }
      @media (prefers-reduced-motion: reduce) {
        body { transition: none; }
      }

    </style>
  </head>
  <body>
    <div class="page">
      <img class="main-img" src="public/14fullth.webp" alt="" />
    </div>
    <a href="index.html" class="home-btn" aria-label="กลับหน้าแรก">
      <img src="public/3home.webp" alt="Home" />
    </a>

    <script>
      (function () {
        function markReady() {
          document.body.classList.add("is-ready");
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", markReady);
        } else {
          markReady();
        }

        var prefersReduced = false;
        try {
          prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        } catch (e) {}
        if (prefersReduced) return;

        document.addEventListener(
          "click",
          function (e) {
            var a = e.target && e.target.closest ? e.target.closest("a") : null;
            if (!a) return;

            if (e.defaultPrevented) return;
            if (e.button !== 0) return;
            if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
            if (a.target && a.target !== "_self") return;

            var href = a.getAttribute("href");
            if (!href || href === "#") return;
            if (href.indexOf("javascript:") === 0) return;
            if (href[0] === "#") return;

            e.preventDefault();
            document.body.classList.add("is-fading");
            window.setTimeout(function () {
              window.location.href = href;
            }, 200);
          },
          true
        );
      })();
    </script>

  </body>
</html>
